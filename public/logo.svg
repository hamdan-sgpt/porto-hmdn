<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer circle with smooth dark background -->
  <circle cx="50" cy="50" r="46" fill="#050505" stroke="#161b22" stroke-width="2" />
  
  <!-- Subtle inner neon gradient ring -->
  <circle cx="50" cy="50" r="42" stroke="url(#logoGradient)" stroke-width="1.5" stroke-opacity="0.35" />

  <!-- Custom geometric monogram: h. -->
  <g transform="translate(10, 0)">
    <!-- Lowercase 'h' -->
    <path d="M 26 25 V 70 M 26 45 C 26 36, 46 36, 46 45 V 70" 
          stroke="url(#logoGradient)" 
          stroke-width="8" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    
    <!-- Neon green dot '.' -->
    <circle cx="58.5" cy="67" r="4.5" fill="#00dc82" />
  </g>

  <!-- Color Gradients -->
  <defs>
    <linearGradient id="logoGradient" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00dc82" />
      <stop offset="100%" stop-color="#36e4da" />
    </linearGradient>
  </defs>
</svg>
